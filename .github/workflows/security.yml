name: Security Scan

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'

jobs:
  # ==========================================================================
  # Python Dependency Scan
  # ==========================================================================
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install safety
        run: pip install safety
      
      - name: Run safety check
        working-directory: ./backend
        run: |
          safety check --file=requirements.txt --json --output safety-report.json || true
        continue-on-error: true
      
      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r backend/ \
            -f json \
            -o bandit-report.json \
            --exclude backend/tests/,backend/venv/ || true
        continue-on-error: true
      
      - name: Upload Python security reports
        uses: actions/upload-artifact@v4
        with:
          name: python-security-reports
          path: |
            backend/safety-report.json
            bandit-report.json
          retention-days: 90

  # ==========================================================================
  # Node.js Dependency Scan
  # ==========================================================================
  node-security:
    name: Node.js Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run npm audit
        working-directory: ./frontend
        run: |
          npm audit --json > npm-audit-report.json || true
        continue-on-error: true
      
      - name: Upload Node.js security report
        uses: actions/upload-artifact@v4
        with:
          name: node-security-report
          path: frontend/npm-audit-report.json
          retention-days: 90

  # ==========================================================================
  # Docker Image Scan
  # ==========================================================================
  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: mifos-backend:scan
      
      - name: Build frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: mifos-frontend:scan
      
      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mifos-backend:scan'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
        continue-on-error: true
      
      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mifos-frontend:scan'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: '.'
        continue-on-error: true

  # ==========================================================================
  # Security Summary
  # ==========================================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [python-security, node-security, docker-security]
    if: always()
    
    steps:
      - name: Security scan summary
        run: |
          echo "🔒 Security Scan Summary"
          echo "======================="
          echo "Python security: ${{ needs.python-security.result }}"
          echo "Node.js security: ${{ needs.node-security.result }}"
          echo "Docker security: ${{ needs.docker-security.result }}"
          echo ""
          echo "Check the artifacts for detailed reports"
