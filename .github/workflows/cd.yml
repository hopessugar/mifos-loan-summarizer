name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  # ==========================================================================
  # Build and Push Docker Images
  # ==========================================================================
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/mifos-backend
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.environment == 'production' }}
            type=raw,value=${{ inputs.environment }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/mifos-frontend
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.environment == 'production' }}
            type=raw,value=${{ inputs.environment }}
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Deploy to Environment
  # ==========================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy notification
        run: |
          echo "🚀 Deploying version ${{ inputs.version }} to ${{ inputs.environment }}"
          echo "Backend image: ${{ secrets.DOCKER_USERNAME }}/mifos-backend:${{ inputs.version }}"
          echo "Frontend image: ${{ secrets.DOCKER_USERNAME }}/mifos-frontend:${{ inputs.version }}"
      
      # Add your deployment steps here
      # Examples:
      # - SSH to server and run docker-compose pull && docker-compose up -d
      # - Use kubectl to deploy to Kubernetes
      # - Use AWS ECS/Fargate deployment
      # - Use Azure Container Instances
      
      - name: Placeholder deployment step
        run: |
          echo "Add your deployment commands here"
          echo "For example:"
          echo "  - SSH to server"
          echo "  - Pull new images"
          echo "  - Restart containers"
          echo "  - Run health checks"
      
      - name: Health check
        run: |
          echo "Running health checks..."
          echo "Add health check commands here"
          # Example: curl -f https://your-app.com/health || exit 1
      
      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Environment: ${{ inputs.environment }}"
          echo "Version: ${{ inputs.version }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
