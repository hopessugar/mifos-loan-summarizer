[pytest]
# Pytest configuration for mifos-loan-summarizer backend

# Custom markers
markers =
    integration: marks tests as integration tests (require external services like Fineract)
    slow: marks tests as slow running

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using pytest-cov)
# Run with: pytest --cov=backend --cov-report=html
