services:
  # ============================================================================
  # Backend Service - FastAPI application
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mifos-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Application settings
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - API_KEY=${API_KEY}
      
      # LLM Provider Configuration
      - LLM_PRIMARY=${LLM_PRIMARY:-gemini}
      - LLM_MODEL=${LLM_MODEL:-gemini-1.5-flash}
      - LLM_FALLBACK=${LLM_FALLBACK:-}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-}
      
      # LLM Provider API Keys
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:latest}
      
      # Fineract Configuration
      - FINERACT_URL=${FINERACT_URL:-https://demo.mifos.io/fineract-provider}
      - FINERACT_USER=${FINERACT_USER:-mifos}
      - FINERACT_PASSWORD=${FINERACT_PASSWORD}
      - FINERACT_TENANT=${FINERACT_TENANT:-default}
      - FINERACT_SSL_VERIFY=${FINERACT_SSL_VERIFY:-true}
      - FINERACT_CA_BUNDLE=${FINERACT_CA_BUNDLE:-}
      
      # Pipeline Configuration
      - USE_SEMANTIC_CHUNKING=${USE_SEMANTIC_CHUNKING:-false}
      - MAX_SEGMENT_TOKENS=${MAX_SEGMENT_TOKENS:-200}
      - LEVENSHTEIN_THRESHOLD=${LEVENSHTEIN_THRESHOLD:-0.80}
      - COSINE_THRESHOLD=${COSINE_THRESHOLD:-0.80}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.50}
      - MATH_TOLERANCE=${MATH_TOLERANCE:-0.10}
      - MAX_INPUT_CHARS=${MAX_INPUT_CHARS:-2500}
      - EXTRACTION_MAX_TOKENS=${EXTRACTION_MAX_TOKENS:-1500}
      - SUMMARY_MAX_TOKENS=${SUMMARY_MAX_TOKENS:-600}
      - EXTRACTION_TEMPERATURE=${EXTRACTION_TEMPERATURE:-0.1}
    networks:
      - mifos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================================
  # Frontend Service - React + Nginx
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_API_KEY=${API_KEY}
    container_name: mifos-frontend
    ports:
      - "80:8080"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - mifos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# ============================================================================
# Networks
# ============================================================================
networks:
  mifos-network:
    driver: bridge
    name: mifos-network
